# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site
title: 程序员不鸭
subtitle: Java + AI Agent 开发实践
description: 程序员不鸭 · Java 与 AI Agent 开发实践笔记
keywords: Java,Spring,Redis,AI Agent,Docker,Kubernetes
author: 程序员不鸭
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://llyVictory.github.io/
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true

# 代码高亮：matery 使用 Hexo 内置 prismjs，需关闭 highlight.js
syntax_highlighter: prismjs
highlight:
  enable: false
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
prismjs:
  enable: true
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 12
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 12
pagination_dir: page

# Include / Exclude
include:
exclude:
ignore:

# Extensions
theme: hexo-theme-matery

# Deployment
deploy:
  type: ''

# 搜索（matery 依赖 hexo-generator-search）
search:
  path: search.xml
  field: post

# RSS（依赖 hexo-generator-feed）
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20
  content: true
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date

# 中文标题转拼音永久链接（依赖 hexo-permalink-pinyin）
permalink_pinyin:
  enable: true
  separator: '-'
